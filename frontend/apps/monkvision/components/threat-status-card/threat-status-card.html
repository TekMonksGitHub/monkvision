<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: inherit;
    height: 100%;
    background: transparent;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 3px;
    margin: 4px;
}
::-webkit-scrollbar-thumb {
    background: rgba(110, 159, 255, 0.3);
    border-radius: 3px;
    transition: background 0.2s ease;
}
::-webkit-scrollbar-thumb:hover {
    background: rgba(110, 159, 255, 0.5);
}

div#container {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    margin-bottom: 0;
    text-align: center;
    font-weight: 400;
    height: 100%;
    display: flex;
    flex-direction: column;
}

div#content {
    flex: 1;
    font-weight: 400;
    text-align: left;
    overflow-x: hidden;
    max-width: 100%;
    overflow-y: auto;
    padding: 16px;
    background: transparent;
}

div#threat-status-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
}

div.threat-status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-radius: 4px;
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
}

div.threat-status-row:hover {
    transform: translateX(2px);
}

span.attack-name {
    font-size: 0.875rem;
    font-weight: 500;
    color: #c7d0d9;
    flex: 1;
    letter-spacing: 0.02em;
}

span.status-container {
    display: flex;
    align-items: center;
    gap: 10px;
}

span.status-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    box-shadow: 0 0 8px currentColor;
}

span.status-text {
    font-size: 0.8125rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-width: 60px;
    text-align: right;
}

div.threat-status-row.safe {
    background: rgba(99, 163, 117, 0.08);
    border-left-color: #63A375;
}

div.threat-status-row.safe span.status-indicator {
    background-color: #63A375;
    color: #63A375;
}

div.threat-status-row.safe span.status-text {
    color: #63A375;
}

div.threat-status-row.threat {
    background: rgba(239, 100, 97, 0.08);
    border-left-color: #EF6461;
}

div.threat-status-row.threat span.status-indicator {
    background-color: #EF6461;
    color: #EF6461;
    animation: pulse 2s ease-in-out infinite;
}

div.threat-status-row.threat span.status-text {
    color: #EF6461;
}

@keyframes pulse {
    0%, 100% {
        box-shadow: 0 0 8px currentColor;
    }
    50% {
        box-shadow: 0 0 16px currentColor;
    }
}

div#container > p {
    margin: 0;
    font-size: 0.9375rem;
    font-weight: 600;
    padding: 12px 16px;
    background: rgba(24, 27, 31, 0.8);
    border-bottom: 1px solid #2e3338;
    color: #c7d0d9;
    letter-spacing: 0.05em;
    text-align: left;
}

</style>

{{{styleBody}}}

<div id="container">
    <p id="title">{{{title}}}</p>
    <div id="content">
        <div id="threat-status-container">
            {{#attacks}}
            <div class="threat-status-row {{#isSafe}}safe{{/isSafe}}{{^isSafe}}threat{{/isSafe}}">
                <span class="attack-name">{{name}}</span>
                <span class="status-container">
                    <span class="status-indicator"></span>
                    <span class="status-text">{{status}}</span>
                </span>
            </div>
            {{/attacks}}
        </div>
    </div>
</div>
